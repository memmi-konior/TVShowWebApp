<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Show Search</title>
    <link rel="stylesheet" href="app.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Monoton&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:wght@800&display=swap"
        rel="stylesheet">


    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>
    <div id="homeHeading">
        <h1>TV Show Search</h1>
        <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2Z2b3JwcG56OGpvbndpNWt4bWFlYm5kMDdmYWM1cGdyazQ1ZmwyMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Ph0oIVQeuvh0k/giphy.gif"
            alt="Avatar" id="tvIcon">
    </div>

    <div class="center">
        <div id="homeSub">
            <h4><b>Let's watch something...what do you have in mind...?</b></h4>
        </div>
    </div>


    <form id="searchForm">
        <input type="text" placeholder="TV Show Title" name="query">
        <button>Search</button>
    </form>



    <div id="results">
        <!--this is the container for cards-->
    </div>





    <script src="app.js"></script>
</body>

</html>
